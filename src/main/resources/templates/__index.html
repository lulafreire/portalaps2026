<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <title>Portal APS Irecê</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img
          th:src="@{/img/icone_brasao.png}"
          class="brasao-icone-top"
          alt="Ícone Brasão"
        />
        <span class="fw-bold ms-2 organ-title">APS Irecê</span>
      </div>

      <nav class="sidebar-menu d-flex flex-column">
        <div class="menu-items">
          <div class="menu-label">Menu</div>
          <a
            href="/"
            class="nav-link"
            data-bs-toggle="tooltip"
            data-bs-placement="right"
            title="Página Inicial"
          >
            <i class="ph-light ph-house-line"></i>
            <span class="item-title">PÁGINA INICIAL</span>
          </a>
          <a
            href="/digital"
            class="nav-link"
            data-bs-toggle="tooltip"
            data-bs-placement="right"
            title="INSS Digital"
          >
            <i class="ph-light ph-cloud-arrow-down"></i>
            <span class="item-title">INSS DIGITAL</span>
          </a>
          <a
            href="/equipe"
            class="nav-link"
            data-bs-toggle="tooltip"
            data-bs-placement="right"
            title="Equipe"
          >
            <i class="ph-light ph-users"></i>
            <span class="item-title">EQUIPE</span>
          </a>
          <a
            href="/utils"
            class="nav-link"
            data-bs-toggle="tooltip"
            data-bs-placement="right"
            title="Utilitários"
          >
            <i class="ph-light ph-lightbulb"></i>
            <span class="item-title">UTILITÁRIOS</span>
          </a>
          <a
            href="/arquivos"
            class="nav-link"
            data-bs-toggle="tooltip"
            data-bs-placement="right"
            title="Arquivos"
          >
            <i class="ph-light ph-folder-open"></i>
            <span class="item-title">ARQUIVOS</span>
          </a>
        </div>

        <div class="menu-footer mt-auto pb-3">
          <a
            href="/opcoes"
            class="nav-link"
            data-bs-toggle="tooltip"
            data-bs-placement="right"
            title="Opções"
          >
            <i class="ph-light ph-gear"></i>
            <span class="item-title">OPÇÕES</span>
          </a>
        </div>
      </nav>
    </aside>

    <div class="main-wrapper">
      <header class="top-bar mb-4">
        <div class="d-flex align-items-center">
          <button id="sidebarToggle" class="btn text-dark p-0 me-3 shadow-none">
            <i class="ph-light ph-list" style="font-size: 1.5rem"></i>
          </button>

          <div class="search-wrapper d-flex align-items-center">
            <i class="ph-light ph-magnifying-glass me-2"></i>
            <input
              type="text"
              class="search-bar"
              placeholder="Pesquisar links ou documentos"
            />
          </div>
        </div>

        <div class="d-flex align-items-center gap-3">
          <span class="small text-muted">
            Bem-vindo(a),
            <strong
              th:text="${#authentication.name != 'anonymousUser' ? #authentication.name : 'Servidor'}"
              >Servidor</strong
            >
          </span>

          <div class="dropdown user-profile">
            <i
              class="ph-light ph-user-circle"
              data-bs-toggle="dropdown"
              style="font-size: 2.5rem; color: #83878f; cursor: pointer"
            ></i>

            <ul class="dropdown-menu dropdown-menu-end">
              <div sec:authorize="isAuthenticated()">
                <li>
                  <a class="dropdown-item" href="#"
                    ><i class="ph-light ph-star me-2"></i>Favoritos</a
                  >
                </li>
                <li>
                  <a class="dropdown-item" href="#"
                    ><i class="ph-light ph-user me-2"></i>Perfil</a
                  >
                </li>
                <li><hr class="dropdown-divider" /></li>
                <li>
                  <form th:action="@{/logout}" method="post">
                    <button type="submit" class="dropdown-item text-danger">
                      <i class="ph-light ph-sign-out me-2"></i>Sair
                    </button>
                  </form>
                </li>
              </div>
              <div sec:authorize="isAnonymous()">
                <li>
                  <a class="dropdown-item fw-bold" th:href="@{/login}"
                    >Fazer Login</a
                  >
                </li>
              </div>
            </ul>
          </div>
        </div>
      </header>

      <div class="content-body">
        <div class="row">
          <div class="col-md-9">
            <div
              sec:authorize="isAuthenticated()"
              class="favorites-container mx-4 mb-5"
            >
              <span class="favorites-label">Links Favoritos</span>
              <div class="row">
                <p class="text-muted text-center py-4">
                  Você ainda não selecionou favoritos.
                </p>
              </div>
            </div>

            <ul
              class="nav nav-pills mb-4 px-4 border-bottom pb-2 gap-2"
              id="pills-tab"
              role="tablist"
            >
              <li class="nav-item">
                <button
                  class="nav-link active px-4"
                  data-bs-toggle="pill"
                  data-bs-target="#tab-sistemas"
                >
                  <i class="ph-light ph-browsers me-1"></i> Sistemas
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="nav-link px-4"
                  data-bs-toggle="pill"
                  data-bs-target="#tab-formularios"
                >
                  <i class="ph-light ph-files me-1"></i> Formulários
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="nav-link px-4"
                  data-bs-toggle="pill"
                  data-bs-target="#tab-externos"
                >
                  <i class="ph-light ph-globe me-1"></i> Links Externos
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="nav-link px-4"
                  data-bs-toggle="pill"
                  data-bs-target="#tab-manuais"
                >
                  <i class="ph-light ph-book me-1"></i> Manuais
                </button>
              </li>
            </ul>

            <div class="tab-content px-4" id="pills-tabContent">
              <div
                class="tab-pane fade show active"
                id="tab-sistemas"
                role="tabpanel"
              >
                <div class="row g-3">
                  <div th:each="link : ${linksSistemas}" class="col-md-4">
                    <a
                      th:href="${link.url}"
                      target="_blank"
                      class="btn btn-outline-secondary w-100 py-3 text-uppercase small fw-bold shadow-sm"
                      th:text="${link.titulo}"
                      >Link</a
                    >
                  </div>
                  <div
                    th:if="${#lists.isEmpty(linksSistemas)}"
                    class="col-12 text-muted"
                  >
                    Nenhum sistema cadastrado.
                  </div>
                </div>
              </div>

              <div class="tab-pane fade" id="tab-formularios" role="tabpanel">
                <div class="row g-3">
                  <div th:each="link : ${linksFormularios}" class="col-md-4">
                    <a
                      th:href="${link.url}"
                      target="_blank"
                      class="btn btn-outline-secondary w-100 py-3 text-uppercase small fw-bold shadow-sm"
                      th:text="${link.titulo}"
                      >Link</a
                    >
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-3 border-start ps-4">
            <h6 class="text-muted fw-bold mb-4 small">
              <i class="ph-light ph-lightning" style="color: darkorange"></i>
              MAIS ACESSADOS
            </h6>
            <ul class="ranked-list">
              <li th:each="fav, iter : ${maisVisitados}" class="ranked-item">
                <span class="rank-number" th:text="${iter.count}">1</span>
                <a
                  th:href="${fav.url}"
                  class="rank-title"
                  th:text="${fav.titulo}"
                  >Link</a
                >
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const sidebar = document.getElementById("sidebar");
        const toggleBtn = document.getElementById("sidebarToggle");
        let tooltipInstances = [];

        // Função para limpar tooltips existentes
        function clearTooltips() {
          tooltipInstances.forEach((t) => t.dispose());
          tooltipInstances = [];
        }

        // Função para inicializar tooltips (apenas se estiver colapsado)
        function initTooltipsIfCollapsed() {
          clearTooltips();

          if (sidebar.classList.contains("collapsed")) {
            const targets = document.querySelectorAll(
              '[data-bs-toggle="tooltip"]',
            );
            targets.forEach((el) => {
              tooltipInstances.push(new bootstrap.Tooltip(el));
            });
          }
        }

        // Evento de Clique
        toggleBtn.addEventListener("click", function () {
          // Pequeno delay para esperar a animação do CSS começar/terminar
          setTimeout(initTooltipsIfCollapsed, 100);
        });

        // Inicialização na carga da página
        initTooltipsIfCollapsed();
      });
      document.addEventListener("DOMContentLoaded", function () {
        const sidebar = document.getElementById("sidebar");
        const toggleBtn = document.getElementById("sidebarToggle");

        toggleBtn.addEventListener("click", function () {
          sidebar.classList.toggle("collapsed");
          localStorage.setItem(
            "sidebarState",
            sidebar.classList.contains("collapsed") ? "collapsed" : "expanded",
          );
        });

        if (localStorage.getItem("sidebarState") === "collapsed") {
          sidebar.classList.add("collapsed");
        }
      });
    </script>
  </body>
</html>
