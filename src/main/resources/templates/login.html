<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Portal APS Irecê</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
        background-color: #2a3d55; /* Azul escuro vibrante */
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-8">
      <!-- Área do Brasão e Título -->
      <div class="text-center mb-8">
        <!-- Substitua o src pela rota real do seu brasão em /static/img/ -->
        <img
          th:src="@{/img/icone_brasao.png}"
          alt="Brasão Irecê"
          class="mx-auto w-24 mb-4 drop-shadow-lg"
        />
        <h1 class="text-3xl font-bold text-white tracking-tight">
          Portal APS Irecê
        </h1>
        <p class="text-blue-100 mt-2">
          Faça login para ter acesso às funcionalidades.
        </p>
      </div>

      <!-- Formulário Centralizado -->
      <div class="bg-white p-8 rounded-2xl shadow-2xl">
        <form th:action="@{/login}" method="post" class="space-y-6">
          <!-- Alerta de Erro -->
          <div
            th:if="${param.error}"
            class="bg-red-100 border-l-4 border-red-500 text-red-700 p-3 text-sm mb-4"
          >
            Usuário ou senha inválidos.
          </div>

          <div>
            <label class="block text-gray-700 text-sm font-semibold mb-2"
              >Usuário</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"
              >
                <i class="fas fa-user"></i>
              </span>
              <input
                type="text"
                name="username"
                required
                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
                placeholder="Ex: admin_aps"
              />
            </div>
          </div>

          <div>
            <label class="block text-gray-700 text-sm font-semibold mb-2"
              >Senha</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"
              >
                <i class="fas fa-lock"></i>
              </span>
              <input
                type="password"
                name="password"
                required
                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
                placeholder="••••••••"
              />
            </div>
          </div>

          <button
            type="submit"
            class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-lg shadow-lg transform active:scale-95 transition-all"
          >
            ENTRAR NO SISTEMA
          </button>
        </form>
      </div>

      <!-- Rodapé -->
      <p class="text-center text-blue-200 text-xs mt-8">
        &copy; 2026 Portal APS - Desenvolvimento lulafreire
      </p>
    </div>
  </body>
</html>
