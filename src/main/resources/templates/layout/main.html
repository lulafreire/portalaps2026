<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APS Irecê</title>

    <!-- <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />-->

    <!-- <script src="https://unpkg.com/@phosphor-icons/web"></script> -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />

    <link rel="stylesheet" th:href="@{/css/phosphor.css}" />

    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="main-wrapper">
      <div th:replace="~{fragments/sidebar :: sidebar}"></div>

      <div class="content-body">
        <div th:replace="~{fragments/topbar :: topbar}"></div>

        <div class="content-center">
          <div class="row">
            <div class="col-md-9">
              <div layout:fragment="content"></div>
            </div>
            <div class="col-md-3 border-start">
              <!-- Define um fragmento chamado 'aside-extra' -->
              <div layout:fragment="aside-extra">
                <!-- Opcional: Conteúdo padrão aqui caso a página não defina um -->
                <div th:replace="~{fragments/aside :: aside-extra}"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>-->
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const sidebar = document.getElementById("sidebar");
        const toggleBtn = document.getElementById("sidebarToggle");

        if (toggleBtn && sidebar) {
          toggleBtn.addEventListener("click", function () {
            sidebar.classList.toggle("collapsed");
          });
        }
      });
    </script>

    <!-- Captura o estado online/offline ao fazer login -->
    <th:block th:if="${#authorization.expression('isAuthenticated()')}">
      <script th:src="@{/js/stomp.min.js}"></script>
      <script th:src="@{/js/sockjs.min.js}"></script>
      <script th:inline="javascript">
        (function () {
          if (typeof SockJS === "undefined" || typeof Stomp === "undefined")
            return;

          const socket = new SockJS("/ws");
          const client = Stomp.over(socket);
          client.debug = null; // silencia logs fora da página de mensagens

          client.connect(
            {},
            function () {
              console.log("WebSocket global conectado.");
            },
            function (error) {
              console.warn("WebSocket global erro:", error);
            },
          );

          // Disponibiliza globalmente para reutilizar em outras páginas
          window._stompGlobal = client;

          // Desconecta ao fechar/sair da página
          window.addEventListener("beforeunload", function () {
            if (client.connected) client.disconnect();
          });
        })();
      </script>
    </th:block>
  </body>
</html>
