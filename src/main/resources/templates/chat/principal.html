<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/main}"
  th:with="currentPage='mensagens'"
>
  <div layout:fragment="content">
    <main
      class="chat-area d-flex flex-column"
      style="height: calc(100vh - 200px)"
    >
      <!-- Cabeçalho fixo da conversa ativa -->
      <div
        id="chat-header"
        class="d-none rounded-top px-3 py-2 d-flex align-items-center gap-2 border-bottom"
        style="background-color: #cdeff3; min-height: 56px"
      >
        <!-- Avatar com indicador de status -->
        <div class="position-relative flex-shrink-0">
          <img
            id="chat-header-avatar"
            src="/img/avatar_masculino.png"
            class="rounded-circle border"
            style="width: 36px; height: 36px; object-fit: cover"
          />
          <span
            id="chat-header-status"
            class="position-absolute bottom-0 end-0 rounded-circle border border-white d-none"
            style="width: 11px; height: 11px"
          >
          </span>
        </div>

        <!-- Nome e status -->
        <div class="flex-grow-1 text-truncate">
          <div id="chat-header-nome" class="fw-bold small text-dark"></div>
          <div
            id="chat-header-subtitulo"
            class="extra-small"
            style="font-size: 0.7rem"
          ></div>
        </div>
      </div>

      <!-- Área de Mensagens Dinâmica -->
      <div
        id="messages-area"
        class="vibrant-scroll border rounded bg-white p-3 mb-3 flex-grow-1"
        style="overflow-y: auto; background-color: #ffffff !important"
      >
        <div th:fragment="area-mensagens" id="chat-content">
          <!-- O conteúdo aqui é substituído via Ajax pelo carregarHistorico -->
          <div
            th:unless="${estaLogado}"
            class="d-flex flex-column align-items-center justify-content-center h-100 text-muted text-center"
          >
            <i class="ph ph-chat-centered-dots fs-1 mb-3"></i>
            <p>
              Você está visualizando o portal como visitante.<br />Para
              interagir,
              <a th:href="@{/login}" class="fw-bold text-primary">faça login</a
              >.
            </p>
          </div>

          <div
            th:if="${estaLogado and tipoConversa == null}"
            class="d-flex flex-column align-items-center justify-content-center h-100 text-muted"
          >
            <i class="ph ph-chats fs-1 mb-2"></i>
            <p>Selecione um grupo ou servidor para iniciar uma conversa.</p>
          </div>

          <!-- Fragmento carregado quando há conversa ativa -->
          <div th:if="${tipoConversa != null}" class="d-flex flex-column gap-3">
            <div class="text-center mb-3">
              <span
                class="badge bg-light text-muted border py-2 px-3 rounded-pill shadow-sm"
              >
                <i
                  th:class="${tipoConversa == 'GRUPO' ? 'ph ph-users' : 'ph ph-user'}"
                ></i>
                <h5
                  class="mb-0 d-inline ms-2"
                  th:text="${tipoConversa == 'GRUPO' ? conversaAtiva.nome : (servidorDestino != null ? servidorDestino.nomeCompleto : destinatario.username)}"
                ></h5>
              </span>
            </div>

            <div
              th:each="m : ${mensagens}"
              th:class="${m.remetente.username == #authentication.name} ? 'd-flex flex-column align-items-end' : 'd-flex flex-column align-items-start'"
            >
              <div
                th:class="${m.remetente.username == #authentication.name} ? 'bg-primary text-white p-2 rounded-3 shadow-sm' : 'bg-white border p-2 rounded-3 shadow-sm'"
                style="max-width: 75%"
              >
                <small
                  th:if="${m.remetente.username != #authentication.name}"
                  class="d-block fw-bold mb-1 text-primary"
                  style="font-size: 0.7rem"
                  th:text="${m.remetente.username}"
                ></small>
                <span th:text="${m.conteudo}" class="d-block"></span>
                <div
                  class="text-end"
                  style="font-size: 0.65rem; opacity: 0.8; margin-top: 4px"
                >
                  <span
                    th:text="${#temporals.format(m.dataEnvio, 'HH:mm')}"
                  ></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer de envio -->
      <div class="chat-footer" th:if="${estaLogado}">
        <form
          id="messageForm"
          class="d-flex gap-2"
          onsubmit="
            enviarMensagem();
            return false;
          "
        >
          <input type="hidden" id="ativoId" value="" />
          <input type="hidden" id="tipoAtivo" value="" />
          <input
            type="text"
            id="messageInput"
            class="form-control shadow-sm"
            placeholder="Selecione uma conversa..."
            autocomplete="off"
            disabled
          />
          <button
            type="submit"
            id="btnEnviar"
            class="btn btn-primary shadow-sm"
            disabled
          >
            <i class="ph ph-paper-plane-right"></i>
          </button>
        </form>
      </div>
    </main>
  </div>

  <div layout:fragment="aside-extra">
    <div class="p-2">
      <!-- RESTAURADO: Seção de Grupos -->
      <h6 class="text-uppercase text-muted small fw-bold mb-3">Grupos</h6>
      <div class="list-group list-group-flush mb-4">
        <button
          th:each="grupo : ${grupos}"
          class="list-group-item list-group-item-action border-0 px-2 py-2 rounded d-flex align-items-center gap-2"
          th:data-id="${grupo.id}"
          onclick="selecionarChat('grupo', this.getAttribute('data-id'), this)"
        >
          <div
            th:class="'group-avatar ' + (${grupo.id % 4 == 0} ? 'bg-group-1' : (${grupo.id % 4 == 1} ? 'bg-group-2' : (${grupo.id % 4 == 2} ? 'bg-group-3' : 'bg-group-4')))"
            th:text="${#strings.substring(grupo.nome, 0, 1)}"
          >
            G
          </div>
          <div class="d-flex flex-column text-start text-truncate">
            <span
              class="small fw-semibold text-dark text-truncate"
              th:text="${grupo.nome}"
            ></span>
            <span class="text-muted extra-small" style="font-size: 0.7rem">
              <i class="ph ph-users me-1"></i>
              <span th:text="${grupo.quantidadeMembros} + ' membros'"></span>
            </span>
          </div>
        </button>
      </div>

      <h6 class="text-uppercase text-muted small fw-bold mb-3">Servidores</h6>
      <div class="list-group list-group-flush">
        <button
          th:each="servidor : ${servidores}"
          th:if="${servidor.usuario != null}"
          class="list-group-item list-group-item-action border-0 px-2 py-2 rounded d-flex align-items-center"
          th:data-id="${servidor.usuario.id}"
          th:data-username="${servidor.usuario.username}"
          onclick="
            selecionarChat('privado', this.getAttribute('data-id'), this)
          "
        >
          <!-- Avatar com indicador de status sobreposto -->
          <div class="position-relative me-2 flex-shrink-0">
            <img
              th:src="${servidor.usuario.avatarUrl != null} ? @{/img/{url}(url=${servidor.usuario.avatarUrl})} : @{/img/avatar_masculino.png}"
              class="rounded-circle border"
              style="width: 30px; height: 30px; object-fit: cover"
            />
            <span
              class="status-indicator position-absolute bottom-0 end-0 rounded-circle border border-white"
              style="width: 10px; height: 10px"
              th:classappend="${servidor.usuario.online} ? 'bg-success' : 'bg-secondary'"
              th:title="${servidor.usuario.online} ? 'Online' : 'Offline'"
            ></span>
          </div>

          <!-- Nome e username -->
          <div class="text-truncate text-start flex-grow-1">
            <div
              class="fw-bold small text-dark"
              th:text="${servidor.nomeCompleto}"
            ></div>
            <div
              class="text-muted extra-small d-flex align-items-center gap-1"
              style="font-size: 0.7rem"
            >
              <span
                th:text="${servidor.usuario.online} ? 'Online' : 'Offline'"
                th:class="${servidor.usuario.online} ? 'text-success' : 'text-muted'"
              ></span>
              <span class="text-muted">· [[${servidor.usuario.username}]]</span>
            </div>
          </div>
        </button>
      </div>
    </div>

    <script th:src="@{/js/stomp.min.js}"></script>
    <script th:src="@{/js/sockjs.min.js}"></script>

    <script th:inline="javascript">
      const estaLogado = /*[[${estaLogado}]]*/ false;
      const usernameLogado = /*[[${#authentication.name}]]*/ "";
      let stompClient = null;
      let subscricaoAtual = null;

      function atualizarStatusOnline(username, online) {
        // Atualiza o botão na lista lateral (código já existente)
        const btn = document.querySelector(`[data-username="${username}"]`);
        if (btn) {
          const indicador = btn.querySelector(".status-indicator");
          if (indicador) {
            indicador.classList.toggle("bg-success", online);
            indicador.classList.toggle("bg-secondary", !online);
            indicador.title = online ? "Online" : "Offline";
          }
          const textoStatus = btn.querySelector(
            ".text-muted.extra-small span:first-child",
          );
          if (textoStatus) {
            textoStatus.textContent = online ? "Online" : "Offline";
            textoStatus.className = online ? "text-success" : "text-muted";
          }
        }

        // ✅ Atualiza o cabeçalho se o chat ativo for com esse usuário
        const tipoAtivo = document.getElementById("tipoAtivo").value;
        const btnAtivo = document.querySelector(".list-group-item.bg-selected");
        if (
          tipoAtivo === "privado" &&
          btnAtivo &&
          btnAtivo.dataset.username === username
        ) {
          const headerStatus = document.getElementById("chat-header-status");
          const headerSubtitulo = document.getElementById(
            "chat-header-subtitulo",
          );
          if (headerStatus) {
            headerStatus.classList.toggle("bg-success", online);
            headerStatus.classList.toggle("bg-secondary", !online);
          }
          if (headerSubtitulo) {
            headerSubtitulo.textContent = online ? "Online" : "Offline";
            headerSubtitulo.className = online
              ? "extra-small text-success fw-semibold"
              : "extra-small text-muted";
          }
        }
      }

      // Inicialização da conexão ao carregar a página
      if (estaLogado) {
        if (typeof SockJS !== "undefined") {
          const socket = new SockJS("/ws");
          stompClient = Stomp.over(socket);

          stompClient.connect(
            {},
            function (frame) {
              console.log("Conectado ao WebSocket: " + frame);

              // Mensagens privadas
              stompClient.subscribe("/user/queue/messages", function (msg) {
                processarMensagemRecebida(JSON.parse(msg.body));
              });

              // ✅ Status online/offline
              stompClient.subscribe("/topic/status", function (msg) {
                const status = JSON.parse(msg.body);
                atualizarStatusOnline(status.username, status.online);
              });
            },
            function (error) {
              console.error("Erro na conexão STOMP:", error);
            },
          );
        } else {
          console.error(
            "Erro: SockJS não encontrado. Verifique se o arquivo js/sockjs.min.js foi carregado.",
          );
        }
      }

      function selecionarChat(tipo, id, elemento) {
        if (!stompClient || !stompClient.connected) {
          console.warn("WebSocket ainda não conectado.");
          return;
        }

        document
          .querySelectorAll(".list-group-item")
          .forEach((el) => el.classList.remove("bg-selected", "text-white"));
        elemento.classList.add("bg-selected", "text-white");

        document.getElementById("ativoId").value = id;
        document.getElementById("tipoAtivo").value = tipo;

        const input = document.getElementById("messageInput");
        input.disabled = false;
        input.placeholder =
          tipo === "grupo" ? "Mensagem para o grupo..." : "Mensagem...";
        document.getElementById("btnEnviar").disabled = false;
        input.focus();

        // ✅ Popula o cabeçalho fixo
        atualizarCabecalho(tipo, elemento);

        carregarHistorico(tipo, id);

        if (tipo === "grupo") {
          if (subscricaoAtual) subscricaoAtual.unsubscribe();
          subscricaoAtual = stompClient.subscribe(
            "/topic/grupo." + id,
            function (msg) {
              exibirMensagemNaTela(JSON.parse(msg.body));
            },
          );
        }
      }

      function atualizarCabecalho(tipo, elemento) {
        const header = document.getElementById("chat-header");
        const headerAvatar = document.getElementById("chat-header-avatar");
        const headerNome = document.getElementById("chat-header-nome");
        const headerSubtitulo = document.getElementById(
          "chat-header-subtitulo",
        );
        const headerStatus = document.getElementById("chat-header-status");

        if (tipo === "grupo") {
          // Dados do grupo vindos do próprio botão clicado
          const avatarEl = elemento.querySelector(".group-avatar");
          const nomeEl = elemento.querySelector(".fw-semibold");
          const membrosEl = elemento.querySelector(
            ".extra-small span:last-child",
          );

          // Grupo usa ícone de letra em vez de foto
          headerAvatar.style.display = "none";
          headerStatus.classList.add("d-none");

          // Cria/reutiliza avatar de letra
          let letraAvatar = document.getElementById("chat-header-letra");
          if (!letraAvatar) {
            letraAvatar = document.createElement("div");
            letraAvatar.id = "chat-header-letra";
            letraAvatar.className = avatarEl
              ? avatarEl.className
              : "group-avatar bg-group-1";
            letraAvatar.style.cssText =
              "width:36px;height:36px;font-size:1rem;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0";
            headerAvatar.parentNode.insertBefore(letraAvatar, headerAvatar);
          }
          letraAvatar.className = avatarEl
            ? avatarEl.className
            : "group-avatar bg-group-1";
          letraAvatar.style.cssText =
            "width:36px;height:36px;font-size:1rem;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0";
          letraAvatar.textContent = avatarEl
            ? avatarEl.textContent.trim()
            : "G";

          headerNome.textContent = nomeEl ? nomeEl.textContent.trim() : "Grupo";
          headerSubtitulo.textContent = membrosEl
            ? membrosEl.textContent.trim()
            : "";
          headerSubtitulo.className = "extra-small text-muted";
        } else {
          // Dados do servidor vindos do botão clicado
          const imgEl = elemento.querySelector("img");
          const nomeEl = elemento.querySelector(".fw-bold.small");
          const usernameEl = elemento.querySelector(
            ".extra-small span:last-child",
          );
          const statusEl = elemento.querySelector(".status-indicator");
          const online = statusEl && statusEl.classList.contains("bg-success");

          // Remove avatar de letra se existir
          const letraAvatar = document.getElementById("chat-header-letra");
          if (letraAvatar) letraAvatar.remove();

          headerAvatar.style.display = "block";
          headerAvatar.src = imgEl ? imgEl.src : "/img/avatar_masculino.png";

          headerStatus.classList.remove("d-none");
          headerStatus.classList.toggle("bg-success", online);
          headerStatus.classList.toggle("bg-secondary", !online);

          headerNome.textContent = nomeEl ? nomeEl.textContent.trim() : "";
          headerSubtitulo.textContent = online ? "Online" : "Offline";
          headerSubtitulo.className = online
            ? "extra-small text-success fw-semibold"
            : "extra-small text-muted";
        }

        // Exibe o cabeçalho
        header.classList.remove("d-none");
      }

      function enviarMensagem() {
        const input = document.getElementById("messageInput");
        const idDestino = document.getElementById("ativoId").value;
        const tipo = document.getElementById("tipoAtivo").value;

        if (input.value.trim() && stompClient && stompClient.connected) {
          const msg = {
            conteudo: input.value,
            remetente: { username: usernameLogado },
          };

          if (tipo === "grupo") {
            const idNumerico = parseInt(idDestino);
            msg.grupo = { id: idNumerico };

            // Use crases e ${} para garantir que o ID seja injetado na string
            const destino = `/app/chat.grupo.${idNumerico}`;
            console.log("Enviando para:", destino); // Isso vai aparecer no seu console para debug

            stompClient.send(destino, {}, JSON.stringify(msg));
          } else {
            msg.destinatario = { id: parseInt(idDestino) };
            // Se o seu chat privado também usar @DestinationVariable, faça o mesmo aqui:
            stompClient.send(
              "/app/chat.privado." + idDestino,
              {},
              JSON.stringify(msg),
            );
          }

          input.value = "";
        }
      }

      function processarMensagemRecebida(mensagem) {
        const idAtivo = document.getElementById("ativoId").value;
        const tipoAtivo = document.getElementById("tipoAtivo").value;

        const ehDesteChat =
          (mensagem.grupo &&
            mensagem.grupo.id == idAtivo &&
            tipoAtivo === "grupo") ||
          (!mensagem.grupo && tipoAtivo === "privado");

        if (ehDesteChat) {
          exibirMensagemNaTela(mensagem);
        }
      }

      function exibirMensagemNaTela(msg) {
        const container = document.getElementById("chat-content");
        if (!container) return;

        // DTO usa remetenteUsername diretamente
        const remetente =
          msg.remetenteUsername || (msg.remetente && msg.remetente.username);
        const euSouRemetente = remetente === usernameLogado;

        const hora = msg.dataEnvio
          ? new Date(msg.dataEnvio).toLocaleTimeString("pt-BR", {
              hour: "2-digit",
              minute: "2-digit",
            })
          : "";

        const wrapper = document.createElement("div");
        wrapper.className = euSouRemetente
          ? "d-flex flex-column align-items-end"
          : "d-flex flex-column align-items-start";

        wrapper.innerHTML = `
        <div class="${euSouRemetente ? "bg-primary text-white" : "bg-white border"} p-2 rounded-3 shadow-sm"
             style="max-width: 75%">
            ${!euSouRemetente ? `<small class="d-block fw-bold mb-1 text-primary" style="font-size:0.7rem">${remetente}</small>` : ""}
            <span class="d-block">${msg.conteudo}</span>
            <div class="text-end" style="font-size:0.65rem; opacity:0.8; margin-top:4px">
                <span>${hora}</span>
            </div>
        </div>
    `;

        container.appendChild(wrapper);
        scrollParaBaixo();
      }

      function carregarHistorico(tipo, id) {
        fetch(`/chat/historico/${tipo}/${id}`)
          .then((res) => res.text())
          .then((html) => {
            document.getElementById("chat-content").innerHTML = html; // ✅ chat-content, não messages-area
            scrollParaBaixo();
          })
          .catch((err) => console.error("Erro ao carregar histórico:", err));
      }

      function scrollParaBaixo() {
        const area = document.getElementById("messages-area");
        if (area) area.scrollTop = area.scrollHeight;
      }
    </script>
  </div>
</html>
