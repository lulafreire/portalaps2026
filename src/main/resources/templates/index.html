<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/main}"
  th:with="currentPage='home'"
>
  <div layout:fragment="content">
    <ul
      class="nav nav-pills mb-4 px-4 border-bottom pb-2 gap-2"
      id="pills-tab"
      role="tablist"
    >
      <li class="nav-item">
        <button
          class="nav-link active px-4"
          data-bs-toggle="pill"
          data-bs-target="#tab-sistemas"
          type="button"
        >
          SISTEMAS
        </button>
      </li>
      <li class="nav-item">
        <button
          class="nav-link px-4"
          data-bs-toggle="pill"
          data-bs-target="#tab-formularios"
          type="button"
        >
          FORMULÁRIOS
        </button>
      </li>
      <li class="nav-item">
        <button
          class="nav-link px-4"
          data-bs-toggle="pill"
          data-bs-target="#tab-externos"
          type="button"
        >
          LINKS EXTERNOS
        </button>
      </li>
      <li class="nav-item">
        <button
          class="nav-link px-4"
          data-bs-toggle="pill"
          data-bs-target="#tab-manuais"
          type="button"
        >
          MANUAIS
        </button>
      </li>
    </ul>

    <div class="tab-content px-4" id="pills-tabContent">
      <div class="tab-pane fade show active" id="tab-sistemas" role="tabpanel">
        <div class="row g-3">
          <div th:each="link : ${linksSistemas}" class="col-md-4">
            <a
              th:href="${link.url}"
              target="_blank"
              class="btn btn-outline-secondary w-100 py-3 fw-bold shadow-sm"
              th:text="${link.titulo}"
              >Link</a
            >
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="tab-formularios" role="tabpanel">
        <div class="row g-3">
          <div th:each="link : ${linksFormularios}" class="col-md-4">
            <a
              th:href="${link.url}"
              target="_blank"
              class="btn btn-outline-secondary w-100 py-3 fw-bold shadow-sm"
              th:text="${link.titulo}"
              >Link</a
            >
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="tab-externos" role="tabpanel">
        <div class="row g-3">
          <div th:each="link : ${linksExternos}" class="col-md-4">
            <a
              th:href="${link.url}"
              target="_blank"
              class="btn btn-outline-secondary w-100 py-3 fw-bold shadow-sm"
              th:text="${link.titulo}"
              >Link</a
            >
          </div>
          <p
            th:if="${#lists.isEmpty(linksExternos)}"
            class="text-muted text-center py-3"
          >
            Nenhum link externo cadastrado.
          </p>
        </div>
      </div>

      <div class="tab-pane fade" id="tab-manuais" role="tabpanel">
        <div class="row g-3">
          <div th:each="link : ${linksManuais}" class="col-md-4">
            <a
              th:href="${link.url}"
              target="_blank"
              class="btn btn-outline-secondary w-100 py-3 fw-bold shadow-sm"
              th:text="${link.titulo}"
              >Link</a
            >
          </div>
          <p
            th:if="${#lists.isEmpty(linksManuais)}"
            class="text-muted text-center py-3"
          >
            Nenhum manual cadastrado.
          </p>
        </div>
      </div>
    </div>
  </div>
</html>
