spring.application.name=apsirece

# Conexão com o banco
spring.datasource.url=jdbc:mysql://localhost:3306/apsirece_java?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}

# Configurações do Hibernate (ORM)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Tamanho máximo dos uploads
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# Desativa o cache do Thymeleaf para ler as mudanças no HTML na hora
spring.thymeleaf.cache=false

server.error.include-message=always
server.error.include-stacktrace=always
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Garante que o servidor envie o cabeçalho correto para fontes
server.servlet.mime-mapping.woff2=font/woff2
server.servlet.mime-mapping.woff=font/woff